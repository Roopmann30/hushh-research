name: "Branch Freshness"

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
      - deploy
      - deploy_uat

permissions:
  contents: read

concurrency:
  group: freshness-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main-freshness-gate:
    name: "Main Freshness Gate"
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify branch contains latest origin/main
        env:
          MAIN_SYNC_REMOTE: origin
          MAIN_SYNC_BRANCH: main
          MAIN_SYNC_MODE: block
          MAIN_SYNC_CURRENT_BRANCH: ${{ github.head_ref }}
        run: sh scripts/git/check-main-sync.sh

  branch-freshness-advisory:
    name: "Branch Freshness Advisory"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check freshness against origin/main
        env:
          MAIN_SYNC_REMOTE: origin
          MAIN_SYNC_BRANCH: main
          MAIN_SYNC_MODE: warn
          MAIN_SYNC_CURRENT_BRANCH: ${{ github.ref_name }}
        run: sh scripts/git/check-main-sync.sh
